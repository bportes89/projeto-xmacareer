<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="XMA Career">
  <defs>
    <linearGradient id="gBlue" x1="140" y1="190" x2="350" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#163784"/>
      <stop offset="1" stop-color="#1e47a7"/>
    </linearGradient>
    <linearGradient id="gGold" x1="210" y1="250" x2="420" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb300"/>
      <stop offset="1" stop-color="#ff6a00"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="url(#gBlue)"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="url(#gGold)"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="0" dy="2" result="offset"/>
      <feColorMatrix
        in="offset"
        type="matrix"
        values="0 0 0 0 0.05  0 0 0 0 0.08  0 0 0 0 0.15  0 0 0 0.25 0"
        result="shadow"
      />
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <path
      d="M156 254 C 188 190, 248 150, 304 154 C 342 156, 370 178, 392 204"
      fill="none"
      stroke="url(#gBlue)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
      marker-end="url(#arrowBlue)"
      opacity="0.95"
    />
    <path
      d="M196 284 C 230 220, 296 164, 362 140 C 402 126, 434 132, 452 144"
      fill="none"
      stroke="url(#gGold)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
      marker-end="url(#arrowGold)"
      opacity="0.95"
    />
    <path
      d="M244 248 C 260 234, 280 222, 300 214"
      fill="none"
      stroke="#ffffff"
      stroke-width="8"
      stroke-linecap="round"
      opacity="0.7"
    />
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" text-anchor="middle">
    <text x="256" y="390" font-size="92" font-weight="800" fill="#163784" letter-spacing="2">XMA</text>
    <text x="256" y="450" font-size="56" font-weight="800" fill="#ff6a00" letter-spacing="4">CAREER</text>
  </g>
</svg>

